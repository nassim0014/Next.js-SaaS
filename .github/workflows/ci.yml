name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build + Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Type check
        run: pnpm typecheck
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Lint
        run: pnpm lint
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          NEXT_PUBLIC_SUPABASE_URL: "https://fake.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "fake-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "fake-service-role-key"
          DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Run vitest
        run: pnpm test
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (pnpm audit — high+crit)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
