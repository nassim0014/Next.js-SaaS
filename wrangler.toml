name = "nextjs-saas"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".open-next"

# Cron triggers — fire at /api/cron/* with Authorization: Bearer <CRON_SECRET>
[triggers]
crons = [
  "0 0 * * *",       # Daily at midnight UTC → usage-meter
  "0-59/5 * * * *",  # Every 5 minutes → webhook-retry
]

# Environment variables are set in the Cloudflare dashboard (or via `wrangler secret put`).
# Do NOT put secrets in this file — it is committed to git.

# [vars]
# NEXT_PUBLIC_APP_NAME = "Next.js SaaS"

# To set secrets via CLI:
#   wrangler secret put NEXT_PUBLIC_SUPABASE_URL
#   wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put DATABASE_URL
#   wrangler secret put DIRECT_URL
#   wrangler secret put GOOGLE_GENERATIVE_AI_API_KEY
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put CRON_SECRET
#   wrangler secret put WEBHOOK_SIGNING_SECRET
